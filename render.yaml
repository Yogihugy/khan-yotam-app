services:
  - type: web
    name: khan-yotam-api
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: APP_URL
        sync: false
      - key: WATI_API_ENDPOINT
        sync: false
      - key: WATI_API_KEY
        sync: false
      - key: WATI_MOCK
        value: "true"
      - key: WATI_INVITE_TEMPLATE_NAME
        sync: false
      - key: WATI_INVITE_TEMPLATE_LANGUAGE
        value: he
      - key: GUEST_SESSION_DAYS
        value: "15"
      - key: STAFF_SESSION_DAYS
        value: "365"
